<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HoloViz Statistics</title>
<style>
  :root { --bg: #fff; --fg: #1a1a1a; --border: #e0e0e0; --card: #f8f9fa; --accent: #4a90d9; --green: #28a745; --red: #dc3545; }
  [data-theme="dark"] { --bg: #1a1a2e; --fg: #e0e0e0; --border: #333; --card: #16213e; --accent: #64b5f6; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--fg); overflow: auto; }
  .header {
    display: flex; align-items: center; gap: 8px; padding: 8px 16px;
    background: var(--card); border-bottom: 1px solid var(--border);
  }
  .header h3 { font-size: 14px; flex: 1; }
  .header button {
    padding: 3px 8px; border: 1px solid var(--border); border-radius: 3px;
    background: var(--bg); color: var(--fg); cursor: pointer; font-size: 11px;
  }
  .header button:hover { background: var(--accent); color: #fff; }
  .content { display: flex; gap: 12px; padding: 12px; flex-wrap: wrap; }
  .results-panel { flex: 1; min-width: 280px; }
  .result-card {
    padding: 10px 14px; margin: 6px 0; border-radius: 6px;
    background: var(--card); border: 1px solid var(--border); font-size: 13px; line-height: 1.6;
  }
  .result-card .pvalue { font-weight: 700; }
  .result-card .pvalue.sig { color: var(--green); }
  .result-card .pvalue.nonsig { color: var(--red); }
  .chart-panel { flex: 2; min-width: 400px; }
  .chart-panel iframe { width: 100%; height: 450px; border: none; border-radius: 6px; border: 1px solid var(--border); }
  #loading { display: flex; align-items: center; justify-content: center; height: 60vh; color: #888; }
</style>
</head>
<body>
  <div class="header">
    <h3>Statistical Analysis</h3>
    <button onclick="toggleTheme()">Theme</button>
    <button onclick="openFull()">Open Full</button>
  </div>
  <div id="loading">Run statistical_test to see results here</div>
  <div class="content" id="content" style="display: none;">
    <div class="results-panel" id="results"></div>
    <div class="chart-panel" id="chart"></div>
  </div>

  <script>
    let currentHTML = null;
    const pendingRequests = new Map();
    let requestId = 0;

    function sendToHost(method, params = {}) {
      const id = ++requestId;
      return new Promise((resolve, reject) => {
        pendingRequests.set(id, { resolve, reject });
        window.parent.postMessage({ jsonrpc: '2.0', id, method, params }, '*');
      });
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || msg.jsonrpc !== '2.0') return;
      if (msg.id && pendingRequests.has(msg.id)) {
        const { resolve, reject } = pendingRequests.get(msg.id);
        pendingRequests.delete(msg.id);
        msg.error ? reject(msg.error) : resolve(msg.result);
        return;
      }
      if (msg.method === 'ui/notifications/tool-input') {
        const input = msg.params?.input;
        if (input?.html) renderChart(input.html);
        if (input?.results) renderResults(input.results);
      }
    });

    function renderResults(text) {
      const container = document.getElementById('results');
      const lines = text.split('\n').filter(l => l.trim());
      container.innerHTML = lines.map(line => {
        let html = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        // Highlight p-values
        html = html.replace(/(p[- ]?value[:\s]*)([\d.]+)/gi, (m, prefix, val) => {
          const cls = parseFloat(val) < 0.05 ? 'sig' : 'nonsig';
          return `${prefix}<span class="pvalue ${cls}">${val}</span>`;
        });
        if (line.startsWith('#')) return `<h3 style="margin:10px 0 4px;font-size:14px">${line.replace(/^#+\s*/, '')}</h3>`;
        return `<div class="result-card">${html}</div>`;
      }).join('');
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'flex';
    }

    function renderChart(html) {
      currentHTML = html;
      const container = document.getElementById('chart');
      const iframe = document.createElement('iframe');
      iframe.sandbox = 'allow-scripts allow-same-origin';
      iframe.srcdoc = html;
      container.innerHTML = '';
      container.appendChild(iframe);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'flex';
    }

    function toggleTheme() {
      const isDark = document.body.getAttribute('data-theme') === 'dark';
      document.body.setAttribute('data-theme', isDark ? '' : 'dark');
    }

    function openFull() {
      if (!currentHTML) return;
      const blob = new Blob([currentHTML], { type: 'text/html' });
      window.open(URL.createObjectURL(blob), '_blank');
    }

    async function init() {
      try { await sendToHost('ui/initialize', { capabilities: { acceptsNotifications: true } }); } catch (e) {}
    }
    init();
  </script>
</body>
</html>
