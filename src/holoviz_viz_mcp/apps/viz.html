<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HoloViz Chart Viewer</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a1a; --border: #e0e0e0;
    --toolbar-bg: #f8f9fa; --accent: #4a90d9; --accent-hover: #357abd;
  }
  [data-theme="dark"] {
    --bg: #1a1a2e; --fg: #e0e0e0; --border: #333;
    --toolbar-bg: #16213e; --accent: #64b5f6; --accent-hover: #90caf9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); overflow: hidden; }
  .toolbar {
    display: flex; align-items: center; gap: 6px; padding: 6px 12px;
    background: var(--toolbar-bg); border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .toolbar button {
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); color: var(--fg); cursor: pointer; font-size: 12px;
  }
  .toolbar button:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .toolbar .spacer { flex: 1; }
  .toolbar .status { color: #888; font-size: 11px; }
  #viz-container { width: 100%; height: calc(100vh - 37px); }
  #viz-container iframe { width: 100%; height: 100%; border: none; }
  #loading { display: flex; align-items: center; justify-content: center; height: calc(100vh - 37px); color: #888; }
</style>
</head>
<body>
  <div class="toolbar">
    <span style="font-weight: 600;">HoloViz</span>
    <div class="spacer"></div>
    <button onclick="toggleTheme()" title="Toggle theme">Theme</button>
    <button onclick="savePNG()" title="Save as PNG">Save PNG</button>
    <button onclick="openInBrowser()" title="Open full size">Open</button>
    <span class="status" id="status">Ready</span>
  </div>
  <div id="loading">Waiting for visualization...</div>
  <div id="viz-container" style="display: none;"></div>

  <script>
    let currentHTML = null;
    const pendingRequests = new Map();
    let requestId = 0;

    function sendToHost(method, params = {}) {
      const id = ++requestId;
      return new Promise((resolve, reject) => {
        pendingRequests.set(id, { resolve, reject });
        window.parent.postMessage({ jsonrpc: '2.0', id, method, params }, '*');
      });
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg || msg.jsonrpc !== '2.0') return;
      if (msg.id && pendingRequests.has(msg.id)) {
        const { resolve, reject } = pendingRequests.get(msg.id);
        pendingRequests.delete(msg.id);
        msg.error ? reject(msg.error) : resolve(msg.result);
        return;
      }
      if (msg.method === 'ui/notifications/tool-input') {
        const html = msg.params?.input?.html;
        if (html) renderViz(html);
      } else if (msg.method === 'ui/notifications/host-context-changed') {
        const styles = msg.params?.hostContext?.styles;
        if (styles) {
          document.body.style.background = styles.background || '';
          document.body.style.color = styles.foreground || '';
        }
      }
    });

    function renderViz(html) {
      currentHTML = html;
      const container = document.getElementById('viz-container');
      const loading = document.getElementById('loading');
      const iframe = document.createElement('iframe');
      iframe.sandbox = 'allow-scripts allow-same-origin';
      iframe.srcdoc = html;
      container.innerHTML = '';
      container.appendChild(iframe);
      loading.style.display = 'none';
      container.style.display = 'block';
      document.getElementById('status').textContent = 'Rendered';
    }

    function toggleTheme() {
      const isDark = document.body.getAttribute('data-theme') === 'dark';
      document.body.setAttribute('data-theme', isDark ? '' : 'dark');
    }

    function savePNG() {
      if (!currentHTML) return;
      document.getElementById('status').textContent = 'Saving...';
      // Trigger download via canvas capture of the iframe (fallback: open HTML)
      const iframe = document.querySelector('#viz-container iframe');
      if (iframe) {
        const blob = new Blob([currentHTML], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'chart.html';
        a.click();
        document.getElementById('status').textContent = 'Saved as HTML';
      }
    }

    function openInBrowser() {
      if (!currentHTML) return;
      const blob = new Blob([currentHTML], { type: 'text/html' });
      window.open(URL.createObjectURL(blob), '_blank');
    }

    async function init() {
      try {
        await sendToHost('ui/initialize', { capabilities: { acceptsNotifications: true } });
      } catch (e) { console.log('Init:', e); }
    }
    init();
  </script>
</body>
</html>
